<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BodyPointe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --safe-bottom: env(safe-area-inset-bottom);
            --organic-green: #2D5A27;
            --vitality-gold: #D4AF37;
        }
        /* Allow natural scrolling */
        body { 
            background: #FBFBF9;
            min-height: 100vh;
            margin: 0;
            padding-bottom: calc(var(--safe-bottom) + 2rem);
            -webkit-overflow-scrolling: touch;
        }
        /* 3D Body Shading */
        .body-part { 
            fill: url(#3d-skin); 
            stroke: rgba(255,255,255,0.4); 
            stroke-width: 1; 
            transition: all 0.3s ease;
        }
        .pain-active { 
            fill: url(#3d-pain) !important;
            filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.4)) !important;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }
        /* Animation for buttons appearing */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { animation: slideUp 0.6s forwards; }
    </style>
</head>
<body class="px-6">

    <!-- Gradient Definitions -->
    <svg style="width:0;height:0;position:absolute;">
        <defs>
            <radialGradient id="3d-skin" cx="50%" cy="50%" r="60%" fx="30%" fy="30%">
                <stop offset="0%" stop-color="#ffffff" />
                <stop offset="40%" stop-color="#e2e8f0" />
                <stop offset="100%" stop-color="#cbd5e1" />
            </radialGradient>
            <radialGradient id="3d-pain" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fca5a5" />
                <stop offset="100%" stop-color="#ef4444" />
            </radialGradient>
        </defs>
    </svg>

    <!-- 1. Header -->
    <header class="pt-12 pb-6 flex justify-between items-start">
        <div>
            <h1 class="text-3xl font-black tracking-tighter" style="color: var(--organic-green);">BodyPointe<span style="color: var(--vitality-gold);">.</span></h1>
            <p class="text-[10px] uppercase tracking-[0.2em] text-gray-400 font-bold">Holistic Guardian AI</p>
        </div>
        <div class="h-10 w-10 rounded-full bg-white shadow-sm flex items-center justify-center border border-gray-100">
            <span>🦉</span>
        </div>
    </header>

    <!-- 2. The Digital Twin (Large & Tappable) -->
    <section class="flex justify-center py-8">
        <svg viewBox="0 0 240 500" class="w-full max-w-[300px] h-auto drop-shadow-2xl">
            <!-- Head -->
            <path id="head" class="body-part" d="M120,20 c12,0 22,10 22,25 c0,15 -10,25 -22,25 s-22,-10 -22,-25 c0,-15 10,-25 22,-25" onclick="select('head', 'I see tension in the head. Is it a headache or neck pressure?')"/>
            
            <!-- Torso -->
            <p
