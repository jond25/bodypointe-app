<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BodyPointe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --organic-green: #2D5A27;
            --vitality-gold: #D4AF37;
        }
        body { 
            background: #FBFBF9;
            margin: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevents accidental scrolling */
            font-family: -apple-system, system-ui, sans-serif;
        }
        /* Top Section: Body Map only */
        #map-container {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: var(--safe-top);
            z-index: 5; /* Lower layer */
        }
        .body-part { 
            fill: #d1d5db; 
            fill: url(#3d-skin); 
            stroke: #ffffff; 
            stroke-width: 1.5; 
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            pointer-events: auto !important; /* Forces interaction */
        }
        .active { 
            fill: #ef4444 !important; 
            fill: url(#3d-pain) !important;
            filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.5));
        }
        /* Bottom Section: Interaction only */
        #interaction-container {
            background: white;
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            padding: 24px 24px calc(var(--safe-bottom) + 20px);
            z-index: 10; /* Higher layer */
        }
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 11px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <!-- 1. The Map (Top Half) -->
    <div id="map-container">
        <svg viewBox="0 0 240 520" style="height: 90%; width: auto;">
            <defs>
                <radialGradient id="3d-skin" cx="50%" cy="50%" r="60%" fx="35%" fy="35%">
                    <stop offset="0%" stop-color="#ffffff" /><stop offset="100%" stop-color="#cbd5e1" />
                </radialGradient>
                <radialGradient id="3d-pain" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#fca5a5" /><stop offset="100%" stop-color="#ef4444" />
                </radialGradient>
            </defs>

            <!-- Anatomical Paths with direct 'onpointerdown' for instant mobile response -->
            <path id="head" class="body-part" onpointerdown="handleSelect(this, 'Head & Neck')" d="M120,20 c15,0 25,12 25,28 c0,15 -10,28 -25,28 s-25,-13 -25,-28 c0,-16 10,-28 25,-28" />
            <path id="chest" class="body-part" onpointerdown="handleSelect(this, 'Chest')" d="M90,85 Q120,80 150,85 L155,160 Q120,170 85,160 Z" />
            <path id="stomach" class="body-part" onpointerdown="handleSelect(this, 'Stomach')" d="M85,165 Q120,175 155,165 L160,240 Q120,255 80,240 Z" />
            
            <path id="arm_r_up" class="body-part" onpointerdown="handleSelect(this, 'Right Arm')" d="M155,95 L185,170 L165,175 L145,100 Z" />
            <path id="arm_r_low" class="body-part" onpointerdown="handleSelect(this, 'Right Forearm')" d="M188,175 L210,250 L190,255 L168,180 Z" />
            <path id="hand_r" class="body-part" onpointerdown="handleSelect(this, 'Right Hand')" d="M212,255 Q220,280 200,285 L190,260 Z" />
            
            <path id="arm_l_up" class="body-part" onpointerdown="handleSelect(this, 'Left Arm')" d="M85,95 L55,170 L75,175 L95,100 Z" />
            <path id="arm_l_low" class="body-part" onpointerdown="handleSelect(this, 'Left Forearm')" d="M52,175 L30,250 L50,255 L72,180 Z" />
            <path id="hand_l" class="body-part" onpointerdown="handleSelect(this, 'Left Hand')" d="M28,255 Q20,280 40,285 L50,260 Z" />
            
            <path id="leg_r_up" class="body-part" onpointerdown="handleSelect(this, 'Right Thigh')" d="M125,250 L150,380 L115,380 L105,255 Z" />
            <path id="leg_r_low" class="body-part" onpointerdown="handleSelect(this, 'Right Leg')" d="M148,390 L135,500 L110,500 L115,390 Z" />
            <path id="foot_r" class="body-part" onpointerdown="handleSelect(this, 'Right Foot')" d="M135,505 L155,518 L110,518 L110,505 Z" />
            
            <path id="leg_l_up" class="body-part" onpointerdown="handleSelect(this, 'Left Thigh')" d="M115,250 L90,380 L125,380 L135,255 Z" />
            <path id="leg_l_low" class="body-part" onpointerdown="handleSelect(this, 'Left Leg')" d="M92,390 L105,500 L130,500 L125,390 Z" />
            <path id="foot_l" class="body-part" onpointerdown="handleSelect(this, 'Left Foot')" d="M105,505 L85,518 L130,518 L130,505 Z" />
        </svg>
    </div>

    <!-- 2. The Chat (Bottom Half) -->
    <div id="interaction-container">
        <video id="camera-feed" autoplay playsinline style="width:100%; display:none; border-radius:20px; margin-bottom:15px; background:black;"></video>
        
        <p id="chat-bubble" class="text-xl font-bold text-gray-900 leading-tight mb-6">
            "Hello. <span style="color: var(--organic-green)">Tap an area</span> on your Digital Twin."
        </p>

        <div id="btn-group" style="display:none;">
            <button onclick="openCamera()" class="btn text-white" style="background: var(--organic-green);">Insight Lens (Scan)</button>
            <button onclick="soulSync()" class="btn bg-white border border-gray-200 text-gray-600">Soul Sync (Mood)</button>
            
            <div id="remedies" class="mt-4 pt-4 border-t border-gray-100 text-sm font-bold text-gray-500">
                <!-- Remedies appear here -->
            </div>
        </div>
    </div>

    <script>
        // BACKBONE INIT
        const supabaseUrl = 'https://ikknnhihubuswwaqszuf.supabase.co'; 
        const supabaseKey = 'sb_publishable_vMFpYk2SoggPiE_00AYmeA_lw4iCksU';
        const supabase = supabasejs.createClient(supabaseUrl, supabaseKey);

        let selectedId = "";
        const remedyData = {
            "head": "Protocol: Magnesium Oil & Chin Tucks",
            "arm_r_low": "Protocol: Manuka Honey & ACV Soak",
            "stomach": "Protocol: Peppermint Tea & Deep Breath",
            "chest": "Protocol: Doorway Stretch & Eucalyptus"
        };

        function handleSelect(element, name) {
            // Instant visual feedback
            document.querySelectorAll('.body-part').forEach(p => p.classList.remove('active'));
            element.classList.add('active');
            
            // Update State
            selectedId = element.id;
            document.getElementById('chat-bubble').innerHTML = `"I've highlighted your <span style='color:var(--organic-green)'>${name}</span>. What's the plan?"`;
            document.getElementById('btn-group').style.display = 'block';
            document.getElementById('remedies').innerText = remedyData[selectedId] || "Protocol: Rest, Ice, and Hydration";

            if (navigator.vibrate) navigator.vibrate(20);
        }

        async function openCamera() {
            const v = document.getElementById('camera-feed');
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                v.srcObject = s;
                v.style.display = 'block';
                document.getElementById('chat-bubble').innerText = '"Scanning... keep the area in view."';
            } catch (e) { alert("Camera denied."); }
        }

        async function soulSync() {
            const m = prompt("Mood (1-10)?");
            const t = prompt("Trigger?");
            if(!m) return;
            const { error } = await supabase.from('healing_logs').insert([{ body_part: selectedId, mood: m, trigger_text: t }]);
            alert(error ? "Sync Error" : "Saved to Vault!");
        }
    </script>
</body>
</html>
