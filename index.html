<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BodyPointe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --safe-bottom: env(safe-area-inset-bottom);
            --organic-green: #2D5A27;
            --vitality-gold: #D4AF37;
        }
        body { 
            background: #FBFBF9;
            min-height: 100vh;
            margin: 0;
            padding-bottom: calc(var(--safe-bottom) + 2rem);
            -webkit-overflow-scrolling: touch;
        }
        /* Base styling for body parts to ensure they are NEVER invisible */
        .body-part { 
            fill: #d1d5db; /* Backup solid grey */
            fill: url(#3d-skin); /* 3D effect */
            stroke: #ffffff; 
            stroke-width: 1.5; 
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .pain-active { 
            fill: #ef4444 !important; /* Backup solid red */
            fill: url(#3d-pain) !important; 
            filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.5));
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="px-6">

    <!-- 1. Header -->
    <header class="pt-12 pb-6 flex justify-between items-start">
        <div>
            <h1 class="text-3xl font-black tracking-tighter" style="color: var(--organic-green);">BodyPointe<span style="color: var(--vitality-gold);">.</span></h1>
            <p class="text-[10px] uppercase tracking-[0.2em] text-gray-400 font-bold">Holistic Guardian AI</p>
        </div>
        <div class="h-10 w-10 rounded-full bg-white shadow-sm flex items-center justify-center border border-gray-100">
            <span>🦉</span>
        </div>
    </header>

    <!-- 2. The Digital Twin -->
    <section class="flex justify-center py-4">
        <!-- One contained SVG for all paths and gradients -->
        <svg viewBox="0 0 240 520" class="w-full max-w-[320px] h-auto">
            <defs>
                <radialGradient id="3d-skin" cx="50%" cy="50%" r="60%" fx="35%" fy="35%">
                    <stop offset="0%" stop-color="#ffffff" />
                    <stop offset="100%" stop-color="#cbd5e1" />
                </radialGradient>
                <radialGradient id="3d-pain" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#fca5a5" />
                    <stop offset="100%" stop-color="#ef4444" />
                </radialGradient>
            </defs>

            <!-- Head -->
            <path id="head" class="body-part" d="M120,20 c15,0 25,12 25,28 c0,15 -10,28 -25,28 s-25,-13 -25,-28 c0,-16 10,-28 25,-28" onclick="select('head', 'Focusing on the head. Headache or neck tension?')"/>
            
            <!-- Torso -->
            <path id="chest" class="body-part" d="M90,85 Q120,80 150,85 L155,160 Q120,170 85,160 Z" onclick="select('chest', 'Upper torso. Tightness in the chest or shoulders?')"/>
            <path id="stomach" class="body-part" d="M85,165 Q120,175 155,165 L160,240 Q120,255 80,240 Z" onclick="select('stomach', 'Lower torso. Digestive or muscle pain?')"/>

            <!-- Right Arm -->
            <path id="arm_r_up" class="body-part" d="M155,95 L185,170 L165,175 L145,100 Z" onclick="select('arm_r_up', 'Right upper arm.')"/>
            <path id="arm_r_low" class="body-part" d="M188,175 L210,250 L190,255 L168,180 Z" onclick="select('arm_r_low', 'Right forearm.')"/>
            <path id="hand_r" class="body-part" d="M212,255 Q220,280 200,285 L190,260 Z" onclick="select('hand_r', 'Right hand.')"/>

            <!-- Left Arm -->
            <path id="arm_l_up" class="body-part" d="M85,95 L55,170 L75,175 L95,100 Z" onclick="select('arm_l_up', 'Left upper arm.')"/>
            <path id="arm_l_low" class="body-part" d="M52,175 L30,250 L50,255 L72,180 Z" onclick="select('arm_l_low', 'Left forearm.')"/>
            <path id="hand_l" class="body-part" d="M28,255 Q20,280 40,285 L50,260 Z" onclick="select('hand_l', 'Left hand.')"/>

            <!-- Right Leg -->
            <path id="leg_r_up" class="body-part" d="M125,250 L150,380 L115,380 L105,255 Z" onclick="select('leg_r_up', 'Right thigh.')"/>
            <path id="leg_r_low" class="body-part" d="M148,390 L135,500 L110,500 L115,390 Z" onclick="select('leg_r_low', 'Right lower leg.')"/>
            <path id="foot_r" class="body-part" d="M135,505 L155,518 L110,518 L110,505 Z" onclick="select('foot_r', 'Right foot.')"/>

            <!-- Left Leg -->
            <path id="leg_l_up" class="body-part" d="M115,250 L90,380 L125,380 L135,255 Z" onclick="select('leg_l_up', 'Left thigh.')"/>
            <path id="leg_l_low" class="body-part" d="M92,390 L105,500 L130,500 L125,390 Z" onclick="select('leg_l_low', 'Left lower leg.')"/>
            <path id="foot_l" class="body-part" d="M105,505 L85,518 L130,518 L130,505 Z" onclick="select('foot_l', 'Left foot.')"/>
        </svg>
    </section>

    <!-- 3. Interaction Section -->
    <section id="interaction" class="mt-4 mb-20">
        <div class="glass-card p-8">
            <div class="flex items-center gap-3 mb-4">
                <div class="h-2 w-2 rounded-full bg-green-500 animate-ping"></div>
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Guide Analysis</span>
            </div>
            
            <p id="chat-bubble" class="text-2xl font-bold text-gray-900 leading-tight mb-8">
                "Hi. Tap the <span style="color: var(--organic-green);">area</span> where you feel discomfort."
            </p>

            <div id="btn-group" class="hidden flex flex-col gap-4 opacity-0">
                <button onclick="trigger('scan')" class="w-full py-5 rounded-2xl text-white font-bold text-sm tracking-widest shadow-xl active:scale-95 transition-all" style="background: var(--organic-green);">
                    INSIGHT LENS (SCAN)
                </button>
                <button onclick="trigger('soul')" class="w-full py-5 rounded-2xl bg-white border border-gray-100 text-gray-500 font-bold text-sm tracking-widest shadow-sm active:scale-95 transition-all">
                    SOUL SYNC (MOOD)
                </button>
            </div>
        </div>
    </section>

    <script>
        function select(id, msg) {
            if (window.navigator.vibrate) window.navigator.vibrate(20);

            document.querySelectorAll('.body-part').forEach(p => p.classList.remove('pain-active'));
            const selectedPart = document.getElementById(id);
            if(selectedPart) selectedPart.classList.add('pain-active');
            
            document.getElementById('chat-bubble').innerText = `"${msg}"`;
            
            const group = document.getElementById('btn-group');
            group.classList.remove('hidden');
            setTimeout(() => group.style.opacity = "1", 10);

            document.getElementById('interaction').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function trigger(type) {
            alert(type === 'scan' ? 'Opening Insight Lens...' : 'Opening Soul Sync...');
        }
    </script>
</body>
</html>
